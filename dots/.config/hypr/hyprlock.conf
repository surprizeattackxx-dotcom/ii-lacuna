source=~/.config/hypr/hyprlock/colors.conf

# Solid color + blur (no path) — avoids missing $background_DP-* when matugen hasn’t written wallpaper paths.
background {
    monitor = DP-1
    blur_passes = 3
    blur_size = 6
    brightness = 0.7
    vibrancy = 0.2
    color = $inverse_surface
}

background {
    monitor = DP-2
    blur_passes = 3
    blur_size = 6
    brightness = 0.7
    vibrancy = 0.2
    color = $inverse_surface
}

label { # Clock
    monitor =
    text = $TIME12
    color = $inverse_on_surface
    font_size = 72
    font_family = $font_family_clock

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000066)

    position = 0, 260
    halign = center
    valign = center
}

label { # Date
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = $inverse_on_surface
    font_size = 18
    font_family = $font_family

    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(00000066)

    position = 0, 190
    halign = center
    valign = center
}

label { # User
    monitor =
    text = $hyprlock_user_icon    $USER
    color = $on_primary_container
    font_size = 16
    font_family = $font_family

    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    # M3 outlined text field: 1dp hairline, pill (height/2), tonal surface + primary focus ring
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    # Material Symbols (filled); cycles per dot — requires patched hyprlock for multi-glyph dots_text_format.
    dots_text_format = 
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    font_family = $font_material_symbols
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(00000055)
    shadow_boost = 1.15
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = $hyprlock_input_placeholder
    check_text = $hyprlock_check_text
    hide_input = false
    rounding = 24
    check_color = $primary_container
    fail_color = rgba(BA1A1AFF)
    fail_text = $hyprlock_fail_text

    position = 0, 20
    halign = center
    valign = center
}

label { # Caps Lock Warning
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = rgba(BA1A1AFF)
    font_size = 12
    font_family = $font_family
    position = 0, -15
    halign = center
    valign = center
}

label { # Keyboard Layout
    monitor =
    text = $hyprlock_layout_prefix $LAYOUT
    color = $inverse_on_surface
    font_size = 12
    font_family = $font_family

    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(00000044)

    position = -30, 30
    halign = right
    valign = bottom
}

label { # Status
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $inverse_on_surface
    font_size = 12
    font_family = $font_family

    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(00000044)

    position = 30, -30
    halign = left
    valign = top
}
