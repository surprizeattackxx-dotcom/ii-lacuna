animations {
    enabled = true

    bezier = zenIn,  0.3, 0.0, 0.7, 1.0   # symmetric ease, no personality
    bezier = zenOut, 0.3, 0.0, 0.7, 1.0

    animation = windows,       1, 2,   zenIn,  fade
    animation = windowsIn,     1, 2,   zenIn,  fade
    animation = windowsOut,    1, 1.5, zenOut, fade
    animation = windowsMove,   1, 2,   zenIn

    animation = fade,          1, 2,   zenIn
    animation = fadeIn,        1, 2,   zenIn
    animation = fadeOut,       1, 1.5, zenOut
    animation = fadeDim,       1, 2,   zenIn
    animation = fadeShadow,    1, 2,   zenIn
    animation = fadeLayersIn,  1, 2,   zenIn
    animation = fadeLayersOut, 1, 1.5, zenOut

    animation = layersIn,      1, 2,   zenIn,  fade
    animation = layersOut,     1, 1.5, zenOut, fade

    animation = border,        0
    animation = borderangle,   0

    animation = workspaces,       1, 3, zenIn, fade
    animation = specialWorkspace, 1, 3, zenIn, slidefadevert 5%
}
