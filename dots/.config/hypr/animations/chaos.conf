animations {
    enabled = true

    bezier = crazyshot,    0.1,  1.5,  0.76, 0.92
    bezier = OutBack,      0.34, 1.56, 0.64, 1.0
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1.0
    bezier = emphasizedAccel, 0.3,  0.0, 0.8, 0.15
    bezier = easeOutExpo,  0.16, 1.0,  0.3,  1.0
    bezier = easeOutCirc,  0.0,  0.55, 0.45, 1.0
    bezier = menu_decel,   0.1,  1.0,  0.0,  1.0
    bezier = menu_accel,   0.38, 0.04, 1.0,  0.07
    bezier = liner,        1,    1,    1,    1

    animation = windows,       1, 5,   OutBack,         popin 50%   # spring in from center
    animation = windowsIn,     1, 4,   crazyshot,       slide top   # snap in from top
    animation = windowsOut,    1, 3,   emphasizedAccel, slide bottom # fall out the bottom
    animation = windowsMove,   1, 5,   easeOutCirc,     slide

    animation = fade,          1, 4,   emphasizedDecel
    animation = fadeIn,        1, 4,   emphasizedDecel
    animation = fadeOut,       1, 2.5, emphasizedAccel
    animation = fadeDim,       1, 4,   emphasizedDecel
    animation = fadeShadow,    1, 3,   easeOutCirc
    animation = fadeLayersIn,  1, 3,   menu_decel
    animation = fadeLayersOut, 1, 2,   menu_accel

    animation = layersIn,      1, 3,   menu_decel, slide  # slide in
    animation = layersOut,     1, 2,   emphasizedAccel    # fade out

    animation = border,        1, 1,   liner
    animation = borderangle,   1, 30,  liner, loop

    # Workspaces fade — contrasts with sliding windows
    animation = workspaces,       1, 5, easeOutExpo, slidefade 15%
    animation = specialWorkspace, 1, 4, OutBack,     slidefadevert 20%
}
