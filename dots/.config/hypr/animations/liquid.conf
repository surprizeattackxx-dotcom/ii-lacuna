animations {
    enabled = true

    bezier = liquid,    0.85, 0.0,  0.15, 1.0    # full symmetric S-curve
    bezier = liquidIn,  0.4,  0.0,  0.6,  1.0    # ease-in-out
    bezier = liquidOut, 0.0,  0.6,  0.4,  1.0    # flipped
    bezier = flow,      0.25, 0.46, 0.45, 0.94   # medium ease-out (iOS-like)
    bezier = menu_decel, 0.1, 1.0,  0.0,  1.0
    bezier = menu_accel, 0.38, 0.04, 1.0, 0.07

    animation = windows,       1, 6,   liquid,   slide
    animation = windowsIn,     1, 6,   liquidIn, slide
    animation = windowsOut,    1, 4,   liquidOut
    animation = windowsMove,   1, 6,   liquid,   slide

    animation = fade,          1, 5,   flow
    animation = fadeIn,        1, 5,   flow
    animation = fadeOut,       1, 4,   liquidOut
    animation = fadeDim,       1, 5,   flow
    animation = fadeShadow,    1, 5,   flow
    animation = fadeLayersIn,  1, 4,   menu_decel
    animation = fadeLayersOut, 1, 3,   menu_accel

    animation = layersIn,      1, 5,   menu_decel, slide
    animation = layersOut,     1, 3,   menu_accel

    animation = border,        1, 10,  default

    animation = workspaces,       1, 7, liquid, slide
    animation = specialWorkspace, 1, 6, liquid, slidefadevert 15%
}
