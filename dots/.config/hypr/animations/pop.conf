animations {
    enabled = true

    bezier = popIn,      0.05, 0.9,  0.1,  1.08   # slight overshoot into place
    bezier = popOut,     0.3,  0.0,  0.8,  0.1    # quick collapse
    bezier = popBounce,  0.08, 1.1,  0.15, 0.95   # bouncy pop
    bezier = menu_decel, 0.1,  1.0,  0.0,  1.0
    bezier = menu_accel, 0.38, 0.04, 1.0,  0.07
    bezier = liner,      1,    1,    1,    1

    animation = windows,       1, 5,   popBounce, popin 45%
    animation = windowsIn,     1, 5,   popIn,     popin 50%
    animation = windowsOut,    1, 3,   popOut,    popin 85%
    animation = windowsMove,   1, 5,   popIn,     slide

    animation = fade,          1, 4,   popIn
    animation = fadeIn,        1, 4,   popIn
    animation = fadeOut,       1, 2,   popOut
    animation = fadeDim,       1, 4,   popIn
    animation = fadeShadow,    1, 4,   popIn
    animation = fadeLayersIn,  1, 3,   menu_decel
    animation = fadeLayersOut, 1, 2,   menu_accel

    animation = layersIn,      1, 4,   menu_decel, popin 70%
    animation = layersOut,     1, 2,   menu_accel

    animation = border,        1, 1,   liner
    animation = borderangle,   1, 30,  liner, loop

    animation = workspaces,       1, 6, popIn, slidefade 15%
    animation = specialWorkspace, 1, 5, popIn, slidefadevert 20%
}
