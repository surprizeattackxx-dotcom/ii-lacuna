animations {
    enabled = true

    bezier = snap,      0.15, 1.0,  0.25, 1.0   # instant settle, no overshoot
    bezier = snapExit,  0.25, 0.0,  0.75, 0.0   # fast disappear
    bezier = liner,     1,    1,    1,    1

    animation = windows,       1, 1.2, snap,     slide
    animation = windowsIn,     1, 1.2, snap,     slide
    animation = windowsOut,    1, 0.8, snapExit
    animation = windowsMove,   1, 1.5, snap,     slide

    animation = fade,          1, 1.5, snap
    animation = fadeIn,        1, 1.5, snap
    animation = fadeOut,       1, 1.0, snapExit
    animation = fadeDim,       1, 1.0, snap
    animation = fadeShadow,    1, 1.0, snap
    animation = fadeLayersIn,  1, 1.0, snap
    animation = fadeLayersOut, 1, 0.8, snapExit

    animation = layersIn,      1, 1.0, snap
    animation = layersOut,     1, 0.8, snapExit

    animation = border,        0
    animation = borderangle,   0

    animation = workspaces,       1, 1.5, snap, slide
    animation = specialWorkspace, 1, 1.2, snap, slidevert
}
