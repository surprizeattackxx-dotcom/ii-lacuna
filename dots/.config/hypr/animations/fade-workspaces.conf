animations {
    enabled = true

    bezier = md3_decel,  0.05, 0.7, 0.1, 1.0
    bezier = md3_accel,  0.3,  0.0, 0.8, 0.15
    bezier = menu_decel, 0.1,  1.0, 0.0, 1.0
    bezier = menu_accel, 0.38, 0.04, 1.0, 0.07
    bezier = dissolve,   0.4,  0.0, 0.6, 1.0   # smooth symmetric fade

    animation = windows,       1, 4,   md3_decel, popin 60%
    animation = windowsIn,     1, 4,   md3_decel, popin 60%
    animation = windowsOut,    1, 3,   md3_accel, popin 80%
    animation = windowsMove,   1, 4,   md3_decel, slide

    animation = fade,          1, 4,   dissolve
    animation = fadeIn,        1, 4,   dissolve
    animation = fadeOut,       1, 3,   dissolve
    animation = fadeDim,       1, 4,   dissolve
    animation = fadeShadow,    1, 4,   dissolve
    animation = fadeLayersIn,  1, 3,   menu_decel
    animation = fadeLayersOut, 1, 3,   menu_accel

    animation = layersIn,      1, 3,   menu_decel, slide
    animation = layersOut,     1, 2,   menu_accel

    animation = border,        1, 10,  default

    # The star of the show — workspaces fade, not slide
    animation = workspaces,       1, 5, dissolve, fade
    animation = specialWorkspace, 1, 4, dissolve, slidefadevert 15%
}
