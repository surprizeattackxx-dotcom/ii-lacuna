animations {
    enabled = true

    bezier = butter,      0.25, 1.0,  0.5,  1.0    # smooth decel, no overshoot
    bezier = butterIn,    0.4,  0.0,  0.6,  1.0    # ease-in-out symmetric
    bezier = butterOut,   0.4,  0.0,  1.0,  1.0    # ease-in, hard stop
    bezier = fluent,      0.1,  1.0,  0.0,  1.0    # fluent design decel
    bezier = menu_decel,  0.1,  1.0,  0.0,  1.0
    bezier = menu_accel,  0.38, 0.04, 1.0,  0.07

    animation = windows,       1, 6,   butter,    slide
    animation = windowsIn,     1, 6,   butter,    slide
    animation = windowsOut,    1, 5,   butterOut, slide
    animation = windowsMove,   1, 6,   butter,    slide

    animation = fade,          1, 5,   fluent
    animation = fadeIn,        1, 5,   fluent
    animation = fadeOut,       1, 4,   butterOut
    animation = fadeDim,       1, 5,   fluent
    animation = fadeShadow,    1, 5,   fluent
    animation = fadeLayersIn,  1, 4,   fluent
    animation = fadeLayersOut, 1, 3,   menu_accel

    animation = layersIn,      1, 5,   menu_decel, slide
    animation = layersOut,     1, 4,   menu_accel

    animation = border,        1, 10,  default

    animation = workspaces,       1, 8,  butter, slide
    animation = specialWorkspace, 1, 6,  butter, slidefadevert 20%
}
