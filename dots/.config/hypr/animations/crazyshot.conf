nimations {
    enabled = true

    bezier = crazyshot,    0.1,  1.5,  0.76, 0.92   # elastic overshoot snap
    bezier = md3_decel,    0.05, 0.7,  0.1,  1.0    # smooth settle
    bezier = md3_accel,    0.3,  0.0,  0.8,  0.15   # quick exit
    bezier = menu_decel,   0.1,  1.0,  0.0,  1.0    # layer slide in
    bezier = menu_accel,   0.38, 0.04, 1.0,  0.07   # layer slide out
    bezier = liner,        1,    1,    1,    1

    animation = windows,       1, 4,   crazyshot, popin 50%
    animation = windowsIn,     1, 4,   crazyshot, popin 50%
    animation = windowsOut,    1, 3,   md3_accel, popin 80%
    animation = windowsMove,   1, 4,   md3_decel, slide

    animation = fade,          1, 3,   md3_decel
    animation = fadeIn,        1, 3,   md3_decel
    animation = fadeOut,       1, 2,   md3_accel
    animation = fadeDim,       1, 3,   md3_decel
    animation = fadeShadow,    1, 3,   md3_decel

    animation = layersIn,      1, 3,   menu_decel, slide
    animation = layersOut,     1, 2,   menu_accel
    animation = fadeLayersIn,  1, 2,   menu_decel
    animation = fadeLayersOut, 1, 2,   menu_accel

    animation = border,        1, 10,  default
    animation = borderangle,   1, 30,  liner, loop

    animation = workspaces,    1, 5,   md3_decel, slide
    animation = specialWorkspace, 1, 4, md3_decel, slidevert
}
