animations {
    enabled = true

    # MD3 official easing curves
    bezier = emphasized,       0.2,  0.0,  0.0,  1.0    # MD3 Emphasized
    bezier = emphasizedDecel,  0.05, 0.7,  0.1,  1.0    # MD3 Emphasized-Decelerate
    bezier = emphasizedAccel,  0.3,  0.0,  0.8,  0.15   # MD3 Emphasized-Accelerate
    bezier = standard,         0.2,  0.0,  0.0,  1.0    # MD3 Standard
    bezier = standardDecel,    0.0,  0.0,  0.0,  1.0    # MD3 Standard-Decelerate
    bezier = standardAccel,    0.3,  0.0,  1.0,  1.0    # MD3 Standard-Accelerate

    # Windows — MD3 container enter/exit
    animation = windows,       1, 4,   emphasizedDecel, popin 60%
    animation = windowsIn,     1, 4,   emphasizedDecel, popin 60%
    animation = windowsOut,    1, 2.5, emphasizedAccel, popin 90%
    animation = windowsMove,   1, 4,   emphasized,      slide

    # Fades — MD3 fade through
    animation = fade,          1, 3,   standardDecel
    animation = fadeIn,        1, 3,   standardDecel
    animation = fadeOut,       1, 2,   standardAccel
    animation = fadeDim,       1, 3,   standardDecel
    animation = fadeShadow,    1, 3,   standardDecel

    # Layers — MD3 menu/sheet motion
    animation = layersIn,      1, 3,   emphasizedDecel, slide
    animation = layersOut,     1, 2,   emphasizedAccel
    animation = fadeLayersIn,  1, 2.5, standardDecel
    animation = fadeLayersOut, 1, 1.8, standardAccel

    animation = border,        1, 10,  default

    # Workspaces — MD3 page transition
    animation = workspaces,       1, 5, emphasized, slide
    animation = specialWorkspace, 1, 4, emphasizedDecel, slidefadevert 15%
}
