animations {
    enabled = true

    bezier = drop,       0.0,  0.9,  0.3,  1.05   # gravity decel with micro-bounce
    bezier = fall,       0.4,  0.0,  1.0,  0.6    # fast fall exit
    bezier = menu_decel, 0.1,  1.0,  0.0,  1.0
    bezier = menu_accel, 0.38, 0.04, 1.0,  0.07
    bezier = liner,      1,    1,    1,    1

    animation = windows,       1, 5,   drop, slide top
    animation = windowsIn,     1, 5,   drop, slide top
    animation = windowsOut,    1, 3,   fall, slide bottom
    animation = windowsMove,   1, 5,   drop, slide

    animation = fade,          1, 4,   drop
    animation = fadeIn,        1, 4,   drop
    animation = fadeOut,       1, 2,   fall
    animation = fadeDim,       1, 4,   drop
    animation = fadeShadow,    1, 4,   drop
    animation = fadeLayersIn,  1, 3,   menu_decel
    animation = fadeLayersOut, 1, 2,   menu_accel

    animation = layersIn,      1, 4,   menu_decel, slide top
    animation = layersOut,     1, 2,   menu_accel

    animation = border,        1, 1,   liner
    animation = borderangle,   1, 30,  liner, loop

    animation = workspaces,       1, 6, drop, slidevert
    animation = specialWorkspace, 1, 5, drop, slidefadevert 25%
}
