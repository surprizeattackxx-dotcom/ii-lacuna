animations {
    enabled = true

    bezier = snapDecel,  0.1,  0.95, 0.05, 1.0    # fast settle
    bezier = snapAccel,  0.5,  0.0,  0.9,  0.1    # quick exit
    bezier = snapMove,   0.15, 0.9,  0.1,  1.0    # slightly softer for moves
    bezier = menu_decel, 0.1,  1.0,  0.0,  1.0
    bezier = menu_accel, 0.38, 0.04, 1.0,  0.07
    bezier = liner,      1,    1,    1,    1

    animation = windows,       1, 3,   snapDecel, slide
    animation = windowsIn,     1, 3,   snapDecel, slide
    animation = windowsOut,    1, 2,   snapAccel
    animation = windowsMove,   1, 3,   snapMove,  slide

    animation = fade,          1, 2.5, snapDecel
    animation = fadeIn,        1, 2.5, snapDecel
    animation = fadeOut,       1, 1.5, snapAccel
    animation = fadeDim,       1, 2.5, snapDecel
    animation = fadeShadow,    1, 2.5, snapDecel
    animation = fadeLayersIn,  1, 2,   menu_decel
    animation = fadeLayersOut, 1, 1.5, menu_accel

    animation = layersIn,      1, 2.5, menu_decel, slide
    animation = layersOut,     1, 1.5, menu_accel

    animation = border,        1, 1,   liner

    animation = workspaces,       1, 4, snapDecel, slide
    animation = specialWorkspace, 1, 3, snapDecel, slidevert
}
