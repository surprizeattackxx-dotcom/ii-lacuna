animations {
    enabled = true

    bezier = OutBack,     0.34, 1.56, 0.64, 1.0    # spring past and rebound
    bezier = InBack,      0.36, 0.0,  0.66, -0.56  # pull back before launching
    bezier = easeOutCirc, 0.0,  0.55, 0.45, 1.0
    bezier = md3_decel,   0.05, 0.7,  0.1,  1.0
    bezier = menu_decel,  0.1,  1.0,  0.0,  1.0
    bezier = menu_accel,  0.38, 0.04, 1.0,  0.07
    bezier = liner,       1,    1,    1,    1

    animation = windows,       1, 5,   OutBack,    popin 55%
    animation = windowsIn,     1, 5,   OutBack,    popin 55%
    animation = windowsOut,    1, 3,   easeOutCirc, popin 80%
    animation = windowsMove,   1, 5,   OutBack,    slide

    animation = fade,          1, 4,   md3_decel
    animation = fadeIn,        1, 4,   md3_decel
    animation = fadeOut,       1, 3,   easeOutCirc
    animation = fadeDim,       1, 4,   md3_decel
    animation = fadeShadow,    1, 4,   md3_decel
    animation = fadeLayersIn,  1, 3,   menu_decel
    animation = fadeLayersOut, 1, 2,   menu_accel

    animation = layersIn,      1, 4,   OutBack,    slide
    animation = layersOut,     1, 2,   menu_accel

    animation = border,        1, 1,   liner
    animation = borderangle,   1, 30,  liner, loop

    animation = workspaces,       1, 6, OutBack, slide
    animation = specialWorkspace, 1, 5, OutBack, slidevert
}
