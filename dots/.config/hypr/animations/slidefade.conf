animations {
    enabled = true

    bezier = softAcDecel, 0.26, 0.26, 0.15, 1.0   # gentle ease in then decelerate
    bezier = md3_decel,   0.05, 0.7,  0.1,  1.0
    bezier = md3_accel,   0.3,  0.0,  0.8,  0.15
    bezier = menu_decel,  0.1,  1.0,  0.0,  1.0
    bezier = menu_accel,  0.38, 0.04, 1.0,  0.07
    bezier = easeOutCirc, 0.0,  0.55, 0.45, 1.0

    animation = windows,       1, 4,   md3_decel,  popin 65%
    animation = windowsIn,     1, 4,   md3_decel,  popin 65%
    animation = windowsOut,    1, 3,   md3_accel,  popin 80%
    animation = windowsMove,   1, 4,   md3_decel,  slide

    animation = fade,          1, 3,   md3_decel
    animation = fadeIn,        1, 3,   md3_decel
    animation = fadeOut,       1, 2,   md3_accel
    animation = fadeDim,       1, 3,   md3_decel
    animation = fadeShadow,    1, 3,   md3_decel
    animation = fadeLayersIn,  1, 2,   menu_decel
    animation = fadeLayersOut, 1, 2,   menu_accel

    animation = layersIn,      1, 3,   menu_decel, slide
    animation = layersOut,     1, 2,   menu_accel

    animation = border,        1, 10,  default

    # The ghost slide — 20% horizontal direction + fade
    animation = workspaces,       1, 6, softAcDecel, slidefade 20%
    animation = specialWorkspace, 1, 4, md3_decel,   slidefade 10%
}
