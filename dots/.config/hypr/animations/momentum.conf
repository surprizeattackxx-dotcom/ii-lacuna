animations {
    enabled = true

    bezier = momentum,    0.0,  0.9,  0.0,  1.0    # fast launch, hard decel
    bezier = momentumOut, 0.9,  0.0,  1.0,  0.0    # fast out
    bezier = coast,       0.0,  0.75, 0.15, 1.0    # smooth coast to stop
    bezier = menu_decel,  0.1,  1.0,  0.0,  1.0
    bezier = menu_accel,  0.38, 0.04, 1.0,  0.07
    bezier = liner,       1,    1,    1,    1

    animation = windows,       1, 5,   momentum,    slide
    animation = windowsIn,     1, 5,   momentum,    slide
    animation = windowsOut,    1, 2.5, momentumOut, slide
    animation = windowsMove,   1, 4,   momentum,    slide

    animation = fade,          1, 4,   coast
    animation = fadeIn,        1, 4,   coast
    animation = fadeOut,       1, 2,   momentumOut
    animation = fadeDim,       1, 4,   coast
    animation = fadeShadow,    1, 4,   coast
    animation = fadeLayersIn,  1, 3,   menu_decel
    animation = fadeLayersOut, 1, 2,   menu_accel

    animation = layersIn,      1, 3,   menu_decel, slide
    animation = layersOut,     1, 2,   menu_accel

    animation = border,        1, 1,   liner

    # Workspace pan — feels like a real viewport scroll
    animation = workspaces,       1, 7, coast, slide
    animation = specialWorkspace, 1, 5, momentum, slidevert
}
