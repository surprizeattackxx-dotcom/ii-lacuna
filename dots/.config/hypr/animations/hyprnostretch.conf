animations {
    enabled = true

    bezier = hyprnostretch, 0.05, 0.9,  0.1, 1.0    # no stretch, smooth settle
    bezier = easeOutCirc,   0.0,  0.55, 0.45, 1.0   # snappy exit
    bezier = easeOutExpo,   0.16, 1.0,  0.3,  1.0   # workspace transition
    bezier = menu_decel,    0.1,  1.0,  0.0,  1.0
    bezier = menu_accel,    0.38, 0.04, 1.0,  0.07
    bezier = liner,         1,    1,    1,    1

    animation = windows,       1, 5,   hyprnostretch, slide
    animation = windowsIn,     1, 5,   hyprnostretch, slide
    animation = windowsOut,    1, 4,   easeOutCirc,   slide
    animation = windowsMove,   1, 5,   hyprnostretch, slide

    animation = fade,          1, 3,   hyprnostretch
    animation = fadeIn,        1, 3,   hyprnostretch
    animation = fadeOut,       1, 2,   easeOutCirc
    animation = fadeDim,       1, 3,   hyprnostretch
    animation = fadeShadow,    1, 3,   hyprnostretch

    animation = layersIn,      1, 3,   menu_decel, slide
    animation = layersOut,     1, 2,   menu_accel
    animation = fadeLayersIn,  1, 2,   menu_decel
    animation = fadeLayersOut, 1, 2,   menu_accel

    animation = border,        1, 1,   liner
    animation = borderangle,   1, 30,  liner, loop

    animation = workspaces,       1, 5, easeOutExpo, slide
    animation = specialWorkspace, 1, 4, hyprnostretch, slidevert
}
