# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

#-----Apps---------
exec-once = discord
exec-once = steam
exec-once = hamr
exec = hyprpm reload
exec-once = thunderbird
exec-once = openrgb --gui --start-minimized --profile "Default"

# Input method
# exec-once = fcitx5


# Cursor theme — set for both Wayland and XWayland
exec-once = hyprctl setcursor oreo_gruvbox_grey_cursors 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme oreo_gruvbox_grey_cursors
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = mkdir -p ~/.icons/default && printf '[Icon Theme]\nInherits=oreo_gruvbox_grey_cursors\n' > ~/.icons/default/index.theme
