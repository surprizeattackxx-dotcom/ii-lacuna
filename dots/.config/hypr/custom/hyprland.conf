# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ ENVIRONMENT VARIABLES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = AQ_DRM_DEVICES=,/dev/dri/card1:/dev/dri/card0
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;kde
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt6ct,kvantum
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GL_GSYNC_ALLOWED
env = __GL_VRR_ALLOWED
env = XCURSOR_THEME,oreo_gruvbox_grey_cursors
env = XCURSOR_SIZE,24

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ AUTOSTART
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

exec-once = awww-daemon
exec-once = hypridle
exec-once = ~/.config/hypr/scripts/qs_manager.sh
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py &
exec-once = ~/.config/hypr/scripts/init.sh
exec-once = pactl load-module module-null-sink sink_name=echowarp-mic sink_properties=device.description=EchoWarpMic
exec-once = pactl load-module module-remap-source source_name=echowarp-remapped master=echowarp-mic.monitor master_channel_map=front-left,front-right channel_map=front-left,front-right source_properties="device.class=sound device.description=\"EchoWarp Microphone\""
exec-once = ~/.config/hypr/scripts/settings_watcher.sh &
# exec-once = ~/.config/hypr/scripts/qs_manager.sh toggle guide &
exec-once = playerctld
# swayosd replaced by island OSD
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ~/.config/hypr/scripts/volume_listener.sh
exec-once = ~/.config/hypr/scripts/update_notifier.sh
exec-once = systemctl --user enable --now easyeffects
exec-once = hyprpm reload
exec-once = bash ~/.config/hypr/scripts/watch_plugins.sh &
exec-once = discord
exec-once = steam

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ CORE VARIABLES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

$mainMod = SUPER
$terminal = kitty
$editor = kate
$browser = google-chrome-stable

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ SETTINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    border_size = 1
    col.inactive_border = 0xffffffff
    col.active_border = 0xffffffff
    gaps_in = 4
    gaps_out = 4
    float_gaps = 6
    resize_on_border = true
    extend_border_grab_area = 15
}

decoration {
    rounding = 16
    active_opacity = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
	size = 12
	passes = 3
	new_optimizations = yes
  	ignore_opacity=true
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}


input {
    kb_layout = us,ru
    kb_options = grp:caps_toggle
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

}

cursor {
    no_warps = true
}

misc {
    font_family = JetBrains Mono
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    mouse_move_enables_dpms = false
    key_press_enables_dpms = false
    allow_session_lock_restore = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    # Windows pop in instead of sliding
    animation = windows, 1, 5, myBezier, popin 80%
    animation = windowsOut, 1, 5, myBezier, popin 80%
    # Layers (rofi, waybar) set to fade to remove the up/down slide
    animation = layers, 1, 5, myBezier, fade
    animation = layersIn, 1, 5, myBezier, fade
    animation = layersOut, 1, 5, myBezier, fade
    animation = fade, 1, 5, myBezier
    # Workspaces slide horizontally (standard)
    animation = workspaces, 1, 5, myBezier, slide
    # Special workspaces fade to avoid the vertical slide
    animation = specialWorkspaceIn, 1, 5, myBezier, fade
    animation = specialWorkspaceOut, 1, 5, myBezier, fade
}

plugin {
    hyprglass {
        blur_strength = 3.0
        blur_iterations = 4
        refraction_strength = 0.5
        chromatic_aberration = 0.4
        fresnel_strength = 0.5
        edge_thickness = 0.05
        lens_distortion = 0.3
        glass_opacity = 1.0

        layers {
            enabled = 1
            namespaces = quickshell
        }
    }

render {
    ctm_animation = 2
    cm_enabled = true
    cm_auto_hdr = 1
    }

    scrolloverview {
       # gesture_distance = 2 # how far is the "max" for the gesture
        scale = 0.5 # preferred overview scale
        workspace_gap = 20
        wallpaper = 0 # 0: global only, 1: per-workspace only, 2: both
        blur = false # blur only the main overview wallpaper

        shadow {
            enabled = false
            range = 20
            render_power = 3
            color = rgba(1a1a1aee)
        }
    }
}
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ WINDOW & LAYER RULES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

layerrule {
    name = "lr1"
    match:namespace = ^(volume_osd)$
    no_anim = on
}

layerrule {
    name = "lr2"
    match:namespace = ^(brightness_osd)$
    no_anim = on
}

layerrule {
    name = "lr3"
    match:namespace = hyprpicker
    no_anim = on
}

layerrule {
    name = "lr5"
    match:namespace = ext-session-lock
    blur = on
    ignore_alpha = 0.2
}

# Native Hyprland blur for the dynamic island.
# Respects the layer's alpha shape, so the blur takes the pill's rounded
# silhouette and there is no rectangular "kayma" like with HyprGlass.
# In mocha theme the pill is opaque (~0.93) so the blur is hidden anyway.
layerrule {
    name = "qs-island-blur"
    match:namespace = ^(qs-island)$
    blur = on
    ignore_alpha = 0.6
}
layerrule {
    name = "qs-plugin-panel-blur"
    match:namespace = ^(qs-plugin-panel)$
    blur = on
    ignore_alpha = 0.6
}
# ─────────────────────────────
# Window rules
# ─────────────────────────────

# ───────── App Launcher ─────────
windowrule {
    name = "app_launcher"
    match:title = ^(app-launcher)$
    float = on
    center = on
    size = 1200 600
    animation = slide
}
windowrule {
    name = "discord-dp-2"
    match:title = ^(discord)
    monitor = DP-2
}

# ───────── MASTER QUICKSHELL CONTAINER ─────────
windowrule {
    name = "master_rule"
    match:title = ^(qs-master)$
    float = on
    no_shadow = on
    no_initial_focus = on
}

# ───────── File dialogs & portals ─────────
windowrule {
    name = "float_portals"
    match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-gnome|xdg-desktop-portal-kde)$
    float = on
    center = on
    size = 900 600
}

windowrule {
    name = "float_file_dialogs"
    match:title = ^(Open|Save|Save As|Open File|Save File|Open Folder|Choose Files|Select File|Choose File|Browse)(.*)$
    float = on
    center = on
    size = 900 600
}

windowrule {
    name = "float_dialog_class"
    match:class = ^(file-roller|org\.gnome\.FileRoller|nm-connection-editor|pavucontrol|blueman-manager|polkit-gnome-authentication-agent-1|org\.gnome\.polkit|lxpolkit)$
    float = on
    center = on
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ KEYBINDINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ───────── Mouse & Gestures ─────────
gesture = 3, horizontal, workspace
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ───────── Window Management ─────────
bind = $mainMod, Q, exec, bash -c 'if hyprctl activewindow | grep -q "title: qs-master"; then ~/.config/hypr/scripts/qs_manager.sh close; else hyprctl dispatch killactive; fi'
bind = $mainMod&SHIFT_L, F, exec, bash -c 'if ! hyprctl activewindow | grep -q "title: qs-master"; then hyprctl dispatch togglefloating; fi'
binde = $mainMod&SHIFT_L, left, resizeactive,-50 0
binde = $mainMod&SHIFT_L, right, resizeactive,50 0
binde = $mainMod&SHIFT_L, up, resizeactive,0 -50
binde = $mainMod&SHIFT_L, down, resizeactive,0 50
bind = $mainMod&CTRL, left, movewindow, l
bind = $mainMod&CTRL, right, movewindow, r
bind = $mainMod&CTRL, up, movewindow, u
bind = $mainMod&CTRL, down, movewindow, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = SUPER, F,fullscreen
bind = SUPER, TAB, hymission:toggle

# ───────── Applications & Launchers ─────────
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, B, exec, google-chrome-stable
bind = $mainMod, E, exec, nautilus
bind = ALT, TAB, exec, bash ~/.config/hypr/scripts/rofi_show.sh window
bind = $mainMod, C, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle clipboard
bind = $mainMod, A, exec, swaync-client -t -sw

# ───────── Quickshell Controls ─────────
bind = $mainMod&SHIFT_L, E, exec, printf 'edit' > /tmp/qs_island_toggle
bind = $mainMod, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
#bind = $mainMod, B, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind = $mainMod, W, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind = $mainMod, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle calendar
bind = $mainMod&SHIFT_L, T, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind = $mainMod, V, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume
bind = $mainMod, H, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind = $mainMod, SPACE, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle launcher
bind = $mainMod, R, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle monitors
bind = Ctrl+Super, R, exec, killall qs quickshell 2>/dev/null; sleep 0.4; bash ~/.config/hypr/scripts/qs_manager.sh

# ───────── System & Hardware ─────────
# bindl = ALT_L, Space, exec, hyprctl switchxkblayout main prev
# bindl = SHIFT_L, ALT_L, exec, hyprctl switchxkblayout main next
bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bindl = , XF86MonBrightnessDown, exec, bash ~/.config/hypr/scripts/osd_brightness.sh down
bindl = , XF86MonBrightnessUp, exec, bash ~/.config/hypr/scripts/osd_brightness.sh up
bindl = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bindl = SHIFT_L, Print, exec, ~/.config/hypr/scripts/screenshot.sh --edit
bindl = SUPER, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full
bindl = SUPER SHIFT_L, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full --edit
bindl = , XF86PowerOff, exec, bash ~/.config/hypr/scripts/lock.sh
bindel = $mainMod, L, exec, bash ~/.config/hypr/scripts/lock.sh

# ───────── Media & Audio ─────────
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , xf86AudioMicMute, exec, bash ~/.config/hypr/scripts/osd_volume.sh mic
bindl = , xf86audiomute, exec, bash ~/.config/hypr/scripts/osd_volume.sh mute
bindel = , XF86AudioLowerVolume, exec, bash ~/.config/hypr/scripts/osd_volume.sh down
bindel = , xf86audioraisevolume, exec, bash ~/.config/hypr/scripts/osd_volume.sh up

# ───────── Workspaces ─────────
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1
